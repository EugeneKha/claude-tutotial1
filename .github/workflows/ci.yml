name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  IMAGE_TAG: app:ci

jobs:
  # ── test ────────────────────────────────────────────────────────────────────

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  api-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:api
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-api
          path: playwright-report/api/
          retention-days: 7

  e2e-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-e2e
          path: playwright-report/e2e/
          retention-days: 7

  # ── build ────────────────────────────────────────────────────────────────────

  docker-build:
    runs-on: ubuntu-latest
    needs: [unit-test, api-test, e2e-test]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t $IMAGE_TAG .
      - run: docker save $IMAGE_TAG -o image.tar
      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

  # ── integration ───────────────────────────────────────────────────────────────
  # Docker is pre-installed on ubuntu-latest — no DinD needed.
  # -p 3000:3000 binds to the runner's localhost, so BASE_URL stays http://localhost:3000.

  docker-integration:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: docker load -i image.tar
      - run: docker run -d --name app -p 3000:3000 $IMAGE_TAG
      - run: until curl -sf http://localhost:3000/api/hello; do sleep 2; done
      - run: npm run test:api:docker
      - run: npm run test:e2e:docker
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-docker
          path: playwright-report/docker/
          retention-days: 7

  # ── push ──────────────────────────────────────────────────────────────────────
  # Runs only on main. Uses the built-in GITHUB_TOKEN — no secrets needed.

  push-image:
    runs-on: ubuntu-latest
    needs: docker-integration
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push to GitHub Container Registry
        run: |
          FULL_IMAGE=ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker load -i image.tar
          docker tag $IMAGE_TAG $FULL_IMAGE:${{ github.sha }}
          docker tag $IMAGE_TAG $FULL_IMAGE:latest
          docker push $FULL_IMAGE:${{ github.sha }}
          docker push $FULL_IMAGE:latest
